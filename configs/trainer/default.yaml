# @package trainer
#
# Lightning Trainer, callbacks, profiler, and W&B settings.
# All wandb.* keys live here because they are consumed together with
# trainer settings inside train() and PredictionLogger.

# Lightning Trainer
max_epochs: 8                  # upper bound; EarlyStopping(patience) stops sooner
                               # on plateau. val/loss was still dropping at ep2 of
                               # the 3-epoch baseline, so give it room.
precision: bf16-mixed          # bf16-mixed | 16-mixed | 32
accumulate_grad_batches: 4     # effective batch = data.batch_size * this
gradient_clip_val: 1.0
val_check_interval: 1.0        # fraction of epoch; set <1.0 for mid-epoch val
patience: 3                    # EarlyStopping patience in epochs
ckpt_dir: checkpoints
fast_dev_run: false            # true = 1 batch smoke-test, never use for real runs

# Profiler
# null   → disabled (default)
# simple → prints a summary table at the end of training
# advanced → full per-op breakdown written to profiler_logs/
profiler: null

# Weights & Biases
wandb:
  enabled: false
  project: scienceqa-paligemma2
  run_name: ""                 # auto-generated by W&B when empty
  tags: []                     # e.g. [baseline, frozen-vision]
  log_model: false             # don't upload full 3B ckpts as W&B artifacts (huge); adapter is the real artifact
  n_prediction_samples: 32     # rows in the test-predictions artifact table
