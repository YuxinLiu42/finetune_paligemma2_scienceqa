# W&B sweep configuration for hyperparameter search.
# Usage:
#   wandb sweep configs/sweep.yaml          # register sweep, get SWEEP_ID
#   wandb agent <entity>/<project>/SWEEP_ID # launch agent

program: train.py
method: bayes

metric:
  name: val/loss
  goal: minimize

# Each run gets one combination; agent calls train.py with Hydra overrides.
command:
  - ${env}
  - python
  - -m
  - project_name.train
  - ${args_no_hyphens}   # Hydra expects key=value, not --key value

parameters:
  model.learning_rate:
    distribution: log_uniform_values
    # ~1 decade centered (log) on the working 1e-4 baseline. Floor is above the
    # observed-too-small 1e-5; ceiling lets the sweep explore the higher LRs
    # LoRA often prefers (the old 1e-6..1e-4 wasted most runs on too-small LRs
    # and couldn't search above the baseline).
    min: 3e-5
    max: 3e-4

  data.batch_size:
    # bs=8 with max_length=512 (256 image + text) risks OOM on an L4 24GB and
    # would waste sweep runs; bs=4 is the confirmed-good baseline.
    values: [2, 4]

  trainer.accumulate_grad_batches:
    values: [2, 4, 8]

  # NOTE: epochs are intentionally NOT swept. max_epochs=8 + EarlyStopping
  # (patience=3 on val/loss) lets each run train as long as it keeps improving
  # and stop on plateau — sweeping epochs would just burn runs comparing
  # training-length against LR/batch effects. To search capacity instead, add
  # model.lora_r or model.lora_target_modules here.

  # Keep wandb enabled for every sweep run
  trainer.wandb.enabled:
    value: true
