# Cloud Build config for the API/serving image (amd64-native — the laptop is
# arm64, and Cloud Run runs amd64).
# Usage:
#   gcloud builds submit --async --config=cloud/cloudbuild.api.yaml \
#     --project=paligemma-scienceqa .
# Uploads are governed by .gcloudignore (data/, checkpoints, secrets excluded).
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - dockerfiles/api.dockerfile
      - -t
      - europe-west4-docker.pkg.dev/paligemma-scienceqa/mlops-images/paligemma-api:latest
      - .
  # Import smoke test: the in-image project build can silently drop scipali's
  # subpackages (the uv-base drift bug that hit the train image in June and the
  # API image on 2026-07-11: revision 00013 died at deploy with
  # "No module named 'scipali.models'"). A build that passes docker build but
  # can't import the app must FAIL HERE, not at gcloud run deploy.
  # --entrypoint overrides the image's uvicorn entrypoint (exec-form sh -c
  # ignores appended args, so plain `docker run IMAGE python` would not work).
  - name: gcr.io/cloud-builders/docker
    args:
      - run
      - --rm
      - --entrypoint
      - /.venv/bin/python
      - europe-west4-docker.pkg.dev/paligemma-scienceqa/mlops-images/paligemma-api:latest
      - -c
      - "import scipali.models, scipali.monitoring, scipali.serving.api; print('IMPORT_OK')"
images:
  - europe-west4-docker.pkg.dev/paligemma-scienceqa/mlops-images/paligemma-api:latest
timeout: 1800s
# The triggers run builds as a custom service account (the compute SA), and
# Cloud Build then refuses the default logs bucket — pick an explicit logging
# destination. CLOUD_LOGGING_ONLY sends build logs to Cloud Logging.
options:
  logging: CLOUD_LOGGING_ONLY
