workerPoolSpecs:
  - machineSpec:
      machineType: g2-standard-8        # 8 vCPU / 32GB / 1×L4
      acceleratorType: NVIDIA_L4
      acceleratorCount: 1
    replicaCount: 1
    diskSpec:
      bootDiskType: pd-ssd
      bootDiskSizeGb: 300
    containerSpec:
      imageUri: europe-west4-docker.pkg.dev/paligemma-scienceqa/mlops-images/paligemma-train:latest
      # One GPU acquisition runs the baseline AND the sweep (see the script):
      # dvc pull -> CUDA check -> baseline fine-tune -> N-trial W&B sweep.
      command: ["/bin/bash", "cloud/run_baseline_and_sweep.sh"]
      args:
        - data.batch_size=4
        - data.num_workers=4
      env:
        - name: SWEEP_COUNT
          value: "8"
        - name: WANDB_API_KEY
          value: ${WANDB_API_KEY}
        - name: HF_TOKEN
          value: ${HF_TOKEN}
baseOutputDirectory:
  outputUriPrefix: gs://mlops-paligemma-west4/vertex-output/paligemma-lora
